<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lecture Live Translator</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <div>
          <p class="eyebrow">Realtime Speech + Translation</p>
          <h1>Lecture Live Translator</h1>
          <p class="subhead">
            面向长时间讲座的实时听写与翻译。优先在线流式转写，支持俄语、英语、日语，
            同时保留离线文件批处理。
          </p>
        </div>
        <div class="status-card">
          <div class="status-pill" id="connectionStatus">未连接</div>
          <p id="runtimeHint">先填写 GCP 项目，再点击开始监听。</p>
        </div>
      </section>

      <section class="controls-grid">
        <label>
          <span>GCP Project ID</span>
          <input id="projectId" placeholder="my-gcp-project" value="{{ default_project }}" />
        </label>
        <label>
          <span>Speech 区域</span>
          <select id="speechLocation">
            <option value="global">global</option>
            <option value="us">us</option>
            <option value="eu">eu</option>
            <option value="asia-northeast1">asia-northeast1</option>
          </select>
        </label>
        <label>
          <span>输入语言</span>
          <select id="sourceMode">
            <option value="manual">手动指定</option>
            <option value="auto">自动检测（ru/en/ja）</option>
          </select>
        </label>
        <label>
          <span>手动语言</span>
          <select id="sourceLanguage">
            <option value="ru-RU">俄语</option>
            <option value="en-US" {% if default_source_language == "en-US" %}selected{% endif %}>英语</option>
            <option value="ja-JP">日语</option>
          </select>
        </label>
        <label>
          <span>目标语言</span>
          <select id="targetLanguage">
            <option value="zh-CN" {% if default_target_language == "zh-CN" %}selected{% endif %}>简体中文</option>
            <option value="en-US">英语</option>
            <option value="ja-JP">日语</option>
            <option value="ru-RU">俄语</option>
          </select>
        </label>
        <label class="checkbox">
          <input id="translateInterim" type="checkbox" checked />
          <span>实时翻译中间结果</span>
        </label>
      </section>

      <section class="actions">
        <button id="startButton" class="primary">开始监听</button>
        <button id="stopButton" class="secondary" disabled>停止</button>
        <button id="clearButton" class="ghost">清空字幕</button>
      </section>

      <section class="panes">
        <article class="pane">
          <div class="pane-header">
            <h2>原文</h2>
            <span id="detectedLanguage">语言: -</span>
          </div>
          <div id="sourceTranscript" class="transcript"></div>
        </article>
        <article class="pane">
          <div class="pane-header">
            <h2>译文</h2>
            <span>目标: <strong id="targetLanguageBadge">zh-CN</strong></span>
          </div>
          <div id="translatedTranscript" class="transcript"></div>
        </article>
      </section>

      <section class="offline-card">
        <div class="offline-head">
          <div>
            <p class="eyebrow">Offline Backup</p>
            <h2>离线文件转写</h2>
          </div>
          <p>适合长 lecture 录音、录像导出的音频文件。结果会返回双语文本和 SRT。</p>
        </div>
        <form id="offlineForm" class="offline-form">
          <label class="file-drop">
            <span>选择文件</span>
            <input id="offlineFile" name="file" type="file" accept="audio/*,video/*" />
          </label>
          <button type="submit" class="secondary">上传并批处理</button>
        </form>
        <pre id="offlineResult" class="offline-result"></pre>
      </section>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
